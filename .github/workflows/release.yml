name: Release

on:
  release:
    types:
      - published
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-release-assets:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: node20-linux-x64
            asset_name: submit-dir-linux-x64
          - os: ubuntu-latest
            target: node20-linux-arm64
            asset_name: submit-dir-linux-arm64
          - os: macos-latest
            target: node20-macos-x64
            asset_name: submit-dir-darwin-x64
          - os: macos-latest
            target: node20-macos-arm64
            asset_name: submit-dir-darwin-arm64
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build standalone binary
        run: |
          npm run build
          mkdir -p release-assets
          npx pkg dist/index.js --targets ${{ matrix.target }} --output release-assets/${{ matrix.asset_name }}

      - name: Upload binary to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG_NAME="${GITHUB_REF_NAME}"
          if [ -z "$TAG_NAME" ]; then
            TAG_NAME="$(gh release list --limit 1 --json tagName --jq '.[0].tagName')"
          fi
          gh release upload "$TAG_NAME" release-assets/${{ matrix.asset_name }} --clobber

  upload-package:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build package tarballs
        run: |
          npm run build
          PACKAGE_TGZ="$(npm pack | tail -n 1)"
          cp "$PACKAGE_TGZ" submit-dir-latest.tgz
          echo "PACKAGE_TGZ=$PACKAGE_TGZ" >> "$GITHUB_ENV"

      - name: Upload tarballs to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG_NAME="${GITHUB_REF_NAME}"
          if [ -z "$TAG_NAME" ]; then
            TAG_NAME="$(gh release list --limit 1 --json tagName --jq '.[0].tagName')"
          fi
          gh release upload "$TAG_NAME" "$PACKAGE_TGZ" submit-dir-latest.tgz --clobber
