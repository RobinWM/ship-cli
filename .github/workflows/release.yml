name: Release

on:
  release:
    types:
      - published
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-release-assets:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Create npm package tarball
        run: |
          npm pack
          cp submit-dir-*.tgz submit-dir-latest.tgz

      - name: Prepare standalone binary wrapper
        run: |
          mkdir -p release-assets
          cp dist/index.js release-assets/submit-dir-linux-x64
          cp dist/index.js release-assets/submit-dir-linux-arm64
          cp dist/index.js release-assets/submit-dir-darwin-x64
          cp dist/index.js release-assets/submit-dir-darwin-arm64
          chmod +x release-assets/submit-dir-linux-x64
          chmod +x release-assets/submit-dir-linux-arm64
          chmod +x release-assets/submit-dir-darwin-x64
          chmod +x release-assets/submit-dir-darwin-arm64
          mv submit-dir-*.tgz release-assets/
          mv submit-dir-latest.tgz release-assets/

      - name: Upload assets to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG_NAME="${GITHUB_REF_NAME}"
          if [ -z "$TAG_NAME" ] || [ "$TAG_NAME" = "" ]; then
            TAG_NAME="$(gh release list --limit 1 --json tagName --jq '.[0].tagName')"
          fi
          gh release upload "$TAG_NAME" release-assets/* --clobber
